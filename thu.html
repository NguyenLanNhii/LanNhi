<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng sinh nhật</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.2.3/css/bootstrap-grid.min.css"
        integrity="sha512-JQksK36WdRekVrvdxNyV3B0Q1huqbTkIQNbz1dlcFVgNynEMRl0F8OSqOGdVppLUDIvsOejhr/W5L3G/b3J+8w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
        integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 97vh;
        }

        .container svg {
            width: 50%;
            height: 50%;
        }

        * {
            margin: 0;
            padding: 0;
        }

        .body-letter {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at top, #ffe7f1 0%, #ffd8e8 45%, #ffd0df 100%);
        }

        .letter {
            position: relative;
            z-index: 1;
        }

        .valentines {
            position: relative;
            top: 50px;
            cursor: pointer;
            animation: up 3s linear infinite;
            width: 360px;
            height: 320px;
        }

        @keyframes up {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-30px);
            }
        }

        .envelope {
            position: relative;
            width: 320px;
            height: 190px;
            margin: 0 auto;
            top: 96px;
            border-radius: 24px;
            background:
                linear-gradient(180deg, #ffd3e8 0%, #ffb8d9 42%, #f88bbd 100%);
            box-shadow:
                0 14px 26px rgba(212, 88, 148, 0.35),
                inset 0 -12px 18px rgba(185, 58, 121, 0.25),
                inset 0 8px 0 rgba(255, 255, 255, 0.35);
            overflow: hidden;
        }

        .envelope:before {
            content: "";
            position: absolute;
            width: 336px;
            height: 30px;
            top: -18px;
            left: -8px;
            border-radius: 20px;
            background: linear-gradient(90deg, #ffdff0 0%, #ffc9e3 50%, #ffb0d3 100%);
            box-shadow: 0 6px 14px rgba(209, 93, 146, 0.25);
        }

        .envelope:after {
            content: "";
            position: absolute;
            width: 132px;
            height: 132px;
            left: 94px;
            top: 28px;
            border-radius: 50%;
            background:
                radial-gradient(circle at center, #fff8fd 0 9px, #ff95c4 10px 17px, #f56ca8 18px 26px, #bc3f7a 27px 66px);
            box-shadow: 0 0 0 7px rgba(255, 255, 255, 0.28);
            animation: spinDisc 6s linear infinite;
        }

        .card {
            position: absolute;
            background: linear-gradient(180deg, #fffdfd 0%, #ffeaf5 100%);
            width: 230px;
            height: 140px;
            top: 44px;
            left: 64px;
            border-radius: 20px;
            box-shadow: 0 14px 30px rgba(214, 108, 151, 0.3);
            border: 1px solid #ffe3f0;
            backdrop-filter: blur(1px);
            z-index: 12;
        }

        .card:before {
            content: "";
            position: absolute;
            border: 2px dashed #f8a4c5;
            border-style: dotted;
            width: 200px;
            height: 108px;
            left: 13px;
            top: 13px;
            border-radius: 12px;
        }

        .text {
            position: absolute;
            font-family: 'Great Vibes', cursive;
            font-size: 33px;
            text-align: center;
            line-height: 27px;
            top: 14px;
            left: 45px;
            color: #d0538f;
            text-shadow: 0 3px 10px rgba(255, 162, 200, 0.4);
        }

        .heart {
            background-color: #ff5fa2;
            display: inline-block;
            height: 24px;
            margin: 0 10px;
            position: relative;
            top: 92px;
            left: 95px;
            transform: rotate(-45deg);
            width: 24px;
            box-shadow: 0 0 14px rgba(255, 95, 162, 0.5);
        }

        .heart:before,
        .heart:after {
            content: "";
            background-color: #ff5fa2;
            border-radius: 50%;
            height: 24px;
            position: absolute;
            width: 24px;
        }

        .heart:before {
            top: -12px;
            left: 0;
        }

        .heart:after {
            left: 12px;
            top: 0;
        }

        .hearts {
            position: absolute;
            top: 6px;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 14;
        }

        .one,
        .two,
        .three,
        .four,
        .five {
            color: #ff8ec2;
            display: block;
            font-size: 24px;
            position: absolute;
            transform: none;
            width: auto;
            height: auto;
            top: 50px;
            text-shadow: 0 4px 8px rgba(220, 91, 154, 0.35);
        }

        .one::before,
        .two::before,
        .three::before,
        .four::before,
        .five::before {
            content: "\266B";
        }

        .one {
            left: 34px;
            top: 30px;
            animation: noteFloat 2s ease-in-out infinite;
        }

        .two {
            left: 298px;
            top: 56px;
            animation: noteFloat 2.4s ease-in-out infinite;
        }

        .three {
            left: 54px;
            top: 146px;
            animation: noteFloat 1.8s ease-in-out infinite;
        }

        .four {
            left: 286px;
            top: 152px;
            animation: noteFloat 2.2s ease-in-out infinite;
        }

        .five {
            left: 168px;
            top: 4px;
            animation: noteFloat 2.6s ease-in-out infinite;
        }

        @keyframes noteFloat {
            0% {
                transform: translateY(0) scale(0.9);
                opacity: 0.4;
            }

            50% {
                transform: translateY(-12px) scale(1.1);
                opacity: 1;
            }

            100% {
                transform: translateY(-4px) scale(0.95);
                opacity: 0.45;
            }
        }

        .front {
            position: absolute;
            width: 68px;
            height: 12px;
            right: -10px;
            top: 158px;
            border-radius: 999px;
            background: linear-gradient(90deg, #ef76b2 0%, #cd4f90 100%);
            z-index: 10;
            box-shadow: 0 4px 10px rgba(208, 83, 143, 0.3);
            transform: rotate(-12deg);
        }

        .front:before {
            position: absolute;
            content: "";
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 35%, #fff4fb 0 24%, #ff9fcb 25% 100%);
            left: 56px;
            top: -4px;
        }

        @keyframes spinDisc {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .shadow {
            position: absolute;
            width: 300px;
            height: 28px;
            border-radius: 50%;
            background-color: rgba(163, 77, 112, 0.22);
            top: 310px;
            left: 30px;
            animation: scale 3s linear infinite;
            z-index: -1;
        }

        @keyframes scale {

            0%,
            100% {
                transform: scaleX(1);
            }

            50% {
                transform: scaleX(0.85);
            }
        }

        .hover-animation {
            animation: hover 1.75s ease-in-out infinite;
        }

        #castle {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.65) 0 120px, transparent 121px),
                radial-gradient(circle at 88% 15%, rgba(255, 255, 255, 0.55) 0 95px, transparent 96px),
                linear-gradient(160deg, #ffd9ea 0%, #ffc5df 45%, #ffbedf 100%);
        }

        .dustDef {
            position: absolute;
            background-color: white;
            border-radius: 100%;
            box-shadow: 0 0 3px 1px white;
            opacity: 0;
        }

        @keyframes hover {
            0% {
                margin-top: 60px;
            }

            50% {
                margin-top: 50px;
            }

            100% {
                margin-top: 60px;
            }
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 25px 0 #e8b2ca;
            }

            50% {
                box-shadow: 0 0 45px 0 #e8b2ca;
            }

            100% {
                box-shadow: 0 0 25px 0 #e8b2ca;
            }
        }

        @keyframes fall {
            5% {
                top: 209px;
                left: 105px;
                transform: rotate(55deg) scale(0.9, 0.95) skew(-18deg);
                opacity: 0.9;
            }

            30% {
                left: 90px;
            }

            55% {
                left: 130px;
            }

            60%,
            100% {
                top: 380px;
                transform: rotate(30deg) scale(0.9, 0.95) skew(-32deg);
                opacity: 0;
            }
        }

        @keyframes floatAnimate {
            0% {
                background-size: 105% 120%;
                background-position: 0 0;
                opacity: 0.7;
            }

            50% {
                background-size: 100% 100%;
                background-position: 0 0;
                opacity: 0.5;
            }

            100% {
                background-size: 105% 120%;
                background-position: 0 0;
                opacity: 0.7;
            }
        }

        p {
            position: absolute;
            z-index: 2;
        }

        label {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            opacity: .8;
        }

        .letters {
            position: absolute;
            width: 65px;
            transition: 10s ease-in-out;
            cursor: pointer;
            z-index: 1000;
        }

        .letters img {
            width: 100%;
        }

        .wrapperLetterForm {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            background: rgba(94, 39, 66, 0.45);
            backdrop-filter: blur(4px);
            display: none;
        }

        .boxLetter {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .boxLetter .formLetter {
            position: relative;
            width: min(940px, 94vw);
            height: min(620px, 88vh);
            background: linear-gradient(145deg, #fff4fa 0%, #ffe7f4 100%);
            border-radius: 24px;
            z-index: 100;
            padding: 24px 20px;
            border: 1px solid #ffd5e8;
            box-shadow: 0 20px 45px rgba(173, 77, 120, 0.25);
        }

        .formLetter .wrapperLetter {
            position: relative;
            width: 100%;
            height: 100%;
            border: 2px dashed #f293bc;
            border-radius: inherit;
            display: flex;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(180deg, #fff8fc 0%, #ffeff7 100%);
        }

        .formLetter .heartLetter {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #fff2f8;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .heartLetter .heartLetterItem {
            position: relative;
            width: 10px;
            height: 10px;
            transform: rotate(45deg);
            background: #ff79b8;
        }

        .heartLetter:first-child {
            right: 5px;
            top: 10px;
        }

        .heartLetter:nth-child(2) {
            left: 5px;
            bottom: 10px;
        }

        .heartLetterItem::before,
        .heartLetterItem::after {
            position: absolute;
            content: '';
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: inherit;
        }

        .heartLetterItem::before {
            top: -50%;
        }

        .heartLetterItem::after {
            left: -50%;
        }

        .memoryBook {
            position: relative;
            width: 42%;
            height: 100%;
            border-radius: 18px;
            border: 1px solid #ffc3dd;
            background: linear-gradient(160deg, #fff1f8 0%, #ffdff0 100%);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .bookTitle {
            font-family: 'Great Vibes', cursive;
            font-size: 34px;
            color: #cf4d88;
            text-align: center;
            margin: 0;
            line-height: 1.1;
        }

        .memoryGallery {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin: 12px 0;
            flex: 1;
            align-content: center;
        }

        .memoryGallery img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 14px;
            border: 3px solid #fff;
            box-shadow: 0 8px 16px rgba(214, 92, 145, 0.2);
        }

        .bookNote {
            margin: 0;
            font-family: 'Dancing Script', cursive;
            font-size: 22px;
            text-align: center;
            color: #a24f77;
        }

        .textLetter {
            width: 58%;
            flex-direction: column;
            justify-content: center;
            display: flex;
            align-items: center;
            user-select: none;
            position: relative;
            padding: 10px 8px;
        }

        .textLetter h2 {
            font-size: 30px;
            font-weight: 700;
            font-family: 'Dancing Script', cursive;
            color: #d45f99;
            text-shadow: 0 3px 12px rgba(255, 170, 205, 0.45);
            /* Giữ nguyên như ban đầu */
        }

        .textLetter .contentLetter {
            font-size: 19px;
            text-align: center;
            padding: 0px 30px;
            margin-top: 10px;
            font-family: 'Dancing Script', cursive;
            color: #8b4b6f;
            /* Giữ nguyên như ban đầu */
            position: absolute;
            /* Ngắt dòng an toàn khi văn bản dài và cho phép cuộn nội dung */
            word-break: break-word;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
            max-height: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            margin-top: 0;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid #ffd4e8;
            background: linear-gradient(180deg, #fffdfd 0%, #ffeff8 100%);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            backface-visibility: hidden;
            transform-origin: left center;
            transition: transform 0.75s ease, opacity 0.55s ease;
        }

        .letterViewport {
            position: relative;
            width: calc(100% - 20px);
            min-height: 260px;
            height: min(44vh, 320px);
            perspective: 1400px;
            margin-top: 10px;
        }

        .contentLetterPage1 {
            transform: rotateY(0deg);
            opacity: 1;
            z-index: 2;
        }

        .contentLetterPage2 {
            transform: rotateY(180deg);
            opacity: 0;
            z-index: 1;
        }

        .textLetter.page2 .contentLetterPage1 {
            transform: rotateY(-180deg);
            opacity: 0;
            pointer-events: none;
        }

        .textLetter.page2 .contentLetterPage2 {
            transform: rotateY(0deg);
            opacity: 1;
            z-index: 3;
        }

        .letterPages {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            z-index: 3;
        }

        .letterPageBtn {
            border: 1px solid #f3a3c6;
            background: #fff3fa;
            color: #b14e81;
            border-radius: 999px;
            padding: 6px 14px;
            font-family: 'Dancing Script', cursive;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .letterPageBtn.active,
        .letterPageBtn:hover {
            background: linear-gradient(135deg, #ff9bcb 0%, #ff78b8 100%);
            color: #fff;
            box-shadow: 0 6px 14px rgba(227, 97, 158, 0.28);
            border-color: #ff8dc3;
        }

        @media (max-width: 900px) {
            .boxLetter .formLetter {
                height: auto;
                max-height: 90vh;
            }

            .formLetter .wrapperLetter {
                flex-direction: column;
                overflow-y: auto;
            }

            .memoryBook,
            .textLetter {
                width: 100%;
            }

            .memoryGallery {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            .textLetter .contentLetter {
                max-height: 38vh;
            }

            .letterViewport {
                width: 100%;
                height: min(38vh, 290px);
                min-height: 220px;
            }
        }

        .fa-xmark {
            position: absolute;
            right: 20px;
            top: 20px;
            color: #fff;
            cursor: pointer;
            font-size: 25px;
        }

        .show {
            display: block;
        }

        .heartAnimation {
            position: absolute;
            width: 150px;
            bottom: 0;
        }

        .heartAnimation img {
            width: 100%;
        }

        .mewmew1,
        .mewmew2 {
            position: absolute;
            width: 90px;
        }

        .mewmew1 {
            bottom: 0;
            left: 0;
        }

        .mewmew2 {
            bottom: 0;
            right: 0;
        }

        .mewmew1 img,
        .mewmew2 img {
            width: 100%;
        }

        .nextPageBtn {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 170px;
            height: 56px;
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(180deg, rgba(255,230,243,1), rgba(255,210,236,1));
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 10px 30px rgba(225,105,165,0.12), inset 0 1px 0 rgba(255,255,255,0.7);
            font-family: 'Dancing Script', cursive;
            font-size: 26px;
            color: #fff;
            text-decoration: none;
            transition: transform .25s ease, box-shadow .25s ease;
            backdrop-filter: blur(6px) saturate(120%);
            overflow: hidden;
            z-index: 15;
        }

        .nextPageBtn:hover {
            transform: translateX(-50%) translateY(-6px);
            box-shadow: 0 22px 48px rgba(225,105,165,0.18);
        }

        .nextPageBtn:active {
            transform: translateX(-50%) translateY(-2px) scale(.98);
        }

        .nextPageBtn::after {
            content: '';
            position: absolute;
            right: 12px;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(255,255,255,0.2));
            border-radius: 50%;
            filter: blur(6px);
            opacity: 0;
            transition: opacity .25s, transform .25s;
            transform: translateY(-6px) scale(.85);
        }

        .nextPageBtn:hover::after { opacity: 1; transform: translateY(-8px) scale(1.05); }

        .nextPageBtn .btnEmoji {
            font-size: 26px;
            display: inline-block;
            margin-right: 8px;
            animation: softPulse 2.8s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes softPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        .nextPageBtn .btnText { font-size: 24px; color: #fff; text-shadow: 0 4px 14px rgba(255,255,255,0.18); }

        @media (max-width: 480px) {
            .boxLetter .formLetter {
                width: 92vw;
                height: auto;
                max-height: 85vh;
            }

            .formLetter .wrapperLetter {
                gap: 14px;
                padding: 12px;
                overflow-y: auto;
            }

            .memoryBook {
                padding: 10px;
            }

            .bookTitle {
                font-size: 28px;
            }

            .memoryGallery {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .textLetter {
                padding: 6px 4px;
            }

            .textLetter h2 {
                font-size: 24px;
            }

            .textLetter .contentLetter {
                font-size: 16px;
                max-height: none;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding: 12px;
            }

            .letterViewport {
                height: min(42vh, 300px);
                min-height: 200px;
            }

            .letterPages {
                margin-top: 8px;
            }

            .letterPageBtn {
                font-size: 18px;
                padding: 5px 12px;
            }

            .heartAnimation {
                position: static;
                width: 120px;
                margin: 8px auto 0;
            }

            .signature {
                right: 12px;
                bottom: 8px;
                font-size: 16px;
            }

            .nextPageBtn { min-width: 140px; height: 48px; padding: 0 16px; bottom: 12px; }
            .nextPageBtn .btnEmoji { font-size: 20px; }
            .nextPageBtn .btnText { font-size: 20px; }
            .nextPageBtn::after { right: 10px; }
        }
    </style>
</head>

<body>
    <div id="castle">
        <div class="letter">
            <div class="valentines">
                <div class="envelope"></div>
                <div class="front"></div>
                <div class="card">
                    <div class="text">Chúc mừng</br> Sinh nhật</br>!</div>
                    <div class="heart"></div>
                </div>
                <div class="hearts">
                    <div class="one"></div>
                    <div class="two"></div>
                    <div class="three"></div>
                    <div class="four"></div>
                    <div class="five"></div>
                </div>
            </div>
            <div class="shadow"></div>
        </div>
    </div>

    <div class="wrapperLetterForm" style="display: none;">
        <div class="boxLetter">
            <i class="fa-solid fa-xmark"></i>
            <div class="formLetter">
                <div class="heartLetter">
                    <div class="heartLetterItem"></div>
                </div>
                <div class="heartLetter">
                    <div class="heartLetterItem"></div>
                </div>
                <div class="wrapperLetter">
                    <div class="memoryBook">
                        <div class="memoryGallery">
                            <img src="./image/love/22.jpeg" alt="Ky niem 1">
                            <img src="./image/love/12.jpeg" alt="Ky niem 2">
                            <img src="./image/love/7.jpg" alt="Ky niem 3">
                            <img src="./image/love/19.JPG" alt="Ky niem 4">

                clearInterval(timoutTextLetter);

                    funcTimeoutLetterContent();

        }

        let textLetterContentPage2 = document.querySelector('.contentLetterPage2');
        const textLetterP = `Chúc mừng sinh nhật mày 🎂

Chúc mày có một ngày sinh nhật thật vui, thật trọn vẹn 🎉`;
        const textLetterP2 = `Dù thời gian có trôi nhanh đến đâu, mong rằng tình bạn này vẫn luôn là một nơi an toàn nơi mà tụi mình có thể quay về, kể nhau nghe mọi chuyện, dù là vui hay buồn, dù là những điều nhỏ bé nhất. Không cần phải hoàn hảo, không cần phải cố gắng trở thành ai khác, chỉ cần là chính mình thôi cũng đủ.
Cảm ơn vì đã xuất hiện trong thanh xuân của tao theo một cách rất đặc biệt. Không ồn ào nhưng lại bền bỉ, không quá phô trương nhưng lại sâu sắc. Những ký ức tụi mình có với nhau, tao nghĩ sau này nhớ lại vẫn sẽ thấy rất ấm. Mong là sau này, khi mỗi đứa trưởng thành hơn, có nhiều trách nhiệm hơn, thì tình bạn này vẫn không thay đổi vẫn là nơi để tụi mình dựa vào khi cần, và là nơi khiến mình cảm thấy yên tâm khi nghĩ đến. Chúc mày luôn bình an, vững vàng và hạnh phúc với những gì mày chọn. Và hy vọng rằng, trong một khoảnh khắc đẹp nào đó của tương lai, tụi mình vẫn ngồi lại với nhau, nói chuyện như chưa từng có khoảng cách nào xảy ra.`;
        let timoutTextLetterContent;

        function showLetterPage(pageNumber) {
            const pageButtons = document.querySelectorAll('.letterPageBtn');
            const textLetterBox = document.querySelector('.textLetter');
            const isPage1 = pageNumber === 1;

            textLetterBox.classList.toggle('page2', !isPage1);

            pageButtons.forEach((btn) => {
                btn.classList.toggle('active', Number(btn.dataset.page) === pageNumber);
            });

            if (!isPage1) {
                textLetterContentPage2.textContent = textLetterP2;
            }
        }

        function textCharLetterContent() {
            if (indexTextContent < textLetterP.length) {
                textLetterContent.textContent += textLetterP[indexTextContent];
                indexTextContent++;
                setTimeout(textCharLetterContent, 2500);
            } else {
                clearInterval(timoutTextLetterContent);
            }
        }

        function funcTimeoutLetterContent() {
            indexTextContent = 0;
            textLetterContent.textContent = '';
            clearInterval(timoutTextLetterContent);
            timoutTextLetterContent = setInterval(() => {
                textCharLetterContent();
            }, 100);
        }

        const bgm = document.getElementById('bgm');
        const MUSIC_ENABLED_KEY = 'cmsnMusicEnabled';
        const MUSIC_TIME_KEY = 'cmsnMusicTime';
        const MUSIC_SESSION_FLAG_KEY = 'cmsnMusicSessionActive';
        let lastSavedTime = -1;

        function initMusicSession() {
            if (!sessionStorage.getItem(MUSIC_SESSION_FLAG_KEY)) {
                localStorage.removeItem(MUSIC_TIME_KEY);
            }
            sessionStorage.setItem(MUSIC_SESSION_FLAG_KEY, '1');
        }

        function getMusicEnabled() {
            return localStorage.getItem(MUSIC_ENABLED_KEY) !== '0';
        }

        function setMusicEnabled(enabled) {
            localStorage.setItem(MUSIC_ENABLED_KEY, enabled ? '1' : '0');
        }

        function tryPlayMusic() {
            if (!bgm || !getMusicEnabled()) return;
            bgm.muted = false;
            bgm.volume = 0.6;
            bgm.play().catch(() => {
            });
        }

        function unlockMusicOnFirstGesture() {
            const unlock = () => {
                setMusicEnabled(true);
                tryPlayMusic();
                document.removeEventListener('pointerdown', unlock);
                document.removeEventListener('keydown', unlock);
            };

            document.addEventListener('pointerdown', unlock, { once: true });
            document.addEventListener('keydown', unlock, { once: true });
        }

        function restoreMusicTime() {
            if (!bgm) return;
            const savedTime = Number(localStorage.getItem(MUSIC_TIME_KEY) || '0');
            if (Number.isFinite(savedTime) && savedTime > 0) {
                bgm.currentTime = savedTime;
            }
        }

        initMusicSession();

        function saveMusicTime() {
            if (!bgm) return;
            const current = Number((bgm.currentTime || 0).toFixed(3));
            if (current !== lastSavedTime) {
                lastSavedTime = current;
                localStorage.setItem(MUSIC_TIME_KEY, String(current));
            }
        }

        if (bgm) {
            bgm.addEventListener('loadedmetadata', restoreMusicTime, { once: true });
            bgm.addEventListener('timeupdate', saveMusicTime);
            bgm.addEventListener('canplay', tryPlayMusic);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                saveMusicTime();
            } else {
                tryPlayMusic();
            }
        });

        $(document).ready(function () {
            unlockMusicOnFirstGesture();

            const autoplayRetry = setInterval(() => {
                if (bgm && bgm.paused && getMusicEnabled()) {
                    tryPlayMusic();
                } else {
                    clearInterval(autoplayRetry);
                }
            }, 800);

            setTimeout(() => {
                clearInterval(autoplayRetry);
            }, 8000);

            $('.valentines').mouseenter(function () {
                $('.card').stop().animate({
                    top: '-10px'
                }, 'slow');
            }).mouseleave(function () {
                $('.card').stop().animate({
                    top: '44px'
                }, 'slow');
            });

            $('.card').click(function () {
                $('.wrapperLetterForm').fadeIn();
                funcTimeoutLetter();
                showLetterPage(1);
                tryPlayMusic();
            });

            $('.fa-xmark').click(function () {
                $('.wrapperLetterForm').css('display', 'none');
                showLetterPage(1);
            });

            $('.letterPageBtn').click(function () {
                showLetterPage(Number($(this).data('page')));
            });

            $('.nextPageBtn').click(function () {
                saveMusicTime();
                window.location.href = './Flores_NilverTI/FLORES.html';
            });

            tryPlayMusic();
        });

        const head = document.getElementsByTagName('head')[0];
        let animationId = 1;

        function CreateMagicDust(x1, x2, y1, y2, sizeRatio, fallingTime, animationDelay, node = 'main') {
            let dust = document.createElement('span');
            let animation = document.createElement('style');
            animation.innerHTML = `\
      @keyframes blink${animationId}{\
          0% {\
              top: ${y1}px;\
              left: ${x1}px;\
              width: ${2 * sizeRatio}px;\
              height: ${2 * sizeRatio}px;\
              opacity: .4\
          }\
          20% {\
              width: ${4 * sizeRatio}px;\
              height: ${4 * sizeRatio}px;\
              opacity: .8\
          }\
          35% {\
              width: ${2 * sizeRatio}px;\
              height: ${2 * sizeRatio}px;\
              opacity: .5\
          }\
          55% {\
              width: ${3 * sizeRatio}px;\
              height: ${3 * sizeRatio}px;\
              opacity: .7\
          }\
          80% {\
              width: ${sizeRatio}px;\
              height: ${sizeRatio}px;\
              opacity: .3\
          }\
          100% {\
              top: ${y2}px;\
              left: ${x2}px;\
              width: 0px;\
              height: 0px;\
              opacity: .1\
          }}`;
            head.appendChild(animation);
            dust.classList.add('dustDef');
            dust.setAttribute('style', `animation: blink${animationId++} ${fallingTime}s cubic-bezier(.71, .11, .68, .83) infinite ${animationDelay}s`);
            document.getElementById(node).appendChild(dust);
        }
