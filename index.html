<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hộp quà mở nắp</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@500;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pink-100: #ffe8f4;
      --pink-200: #ffd2e9;
      --pink-300: #ffbddf;
      --pink-500: #f06fa8;
      --pink-700: #b84780;
      --text-main: #8d2f62;
    }

    body {
      background:
        radial-gradient(circle at 10% 18%, rgba(255, 255, 255, 0.86) 0 120px, transparent 125px),
        radial-gradient(circle at 88% 14%, rgba(255, 255, 255, 0.6) 0 95px, transparent 100px),
        linear-gradient(150deg, #ffeaf6 0%, #ffd8ec 40%, #ffc7e3 100%);
      background-size: 140% 140%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: clamp(6px, 2vh, 14px);
      min-height: 100vh;
      padding: clamp(14px, 3vw, 26px);
      overflow: hidden;
      transition: opacity 0.3s ease;
      touch-action: manipulation;
      animation: backgroundFlow 10s ease-in-out infinite;
      font-family: 'Nunito', sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(6px);
      z-index: 0;
      opacity: 0.65;
    }

    body::before {
      width: min(48vw, 420px);
      height: min(48vw, 420px);
      left: -10vw;
      top: -8vh;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.7) 0%, rgba(255, 213, 235, 0) 70%);
      animation: glowDrift 9s ease-in-out infinite;
    }

    body::after {
      width: min(44vw, 380px);
      height: min(44vw, 380px);
      right: -8vw;
      bottom: -10vh;
      background: radial-gradient(circle, rgba(255, 195, 225, 0.7) 0%, rgba(255, 195, 225, 0) 70%);
      animation: glowDrift 11s ease-in-out infinite reverse;
    }

    body.fade-out {
      opacity: 0;
    }

    .click-area {
      position: fixed;
      inset: 0; 
      z-index: 50; 
      cursor: pointer;
      background: transparent;
      touch-action: manipulation;
    }

    .hero-copy {
      position: relative;
      z-index: 3;
      text-align: center;
      max-width: min(92vw, 760px);
      color: var(--text-main);
      text-shadow: 0 6px 18px rgba(255, 255, 255, 0.62);
      animation: fadeInDown 0.8s ease-out both;
    }

    .hero-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 5.2vw, 3.3rem);
      line-height: 1.15;
      color: var(--pink-700);
      letter-spacing: 0.3px;
      margin-bottom: clamp(6px, 1.8vh, 12px);
    }

    .hero-sub {
      font-size: clamp(0.95rem, 2.4vw, 1.2rem);
      font-weight: 700;
      color: #a54b7e;
      opacity: 0.95;
    }

    .gift-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      width: min(96vw, 580px);
      max-width: none;
      padding: clamp(10px, 2.4vw, 18px);
      margin-top: 0;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.5), rgba(255, 245, 251, 0.22));
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 14px 36px rgba(212, 88, 148, 0.2);
      backdrop-filter: blur(4px);
      z-index: 2;
      animation: fadeInUp 0.85s ease-out both;
    }

    .bg-bokeh,
    .ambient-notes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-bokeh span {
      position: absolute;
      width: clamp(10px, 1.8vw, 18px);
      height: clamp(10px, 1.8vw, 18px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0) 70%);
      animation: bokehFloat 6s ease-in-out infinite;
      opacity: 0.7;
    }

    .bg-bokeh span:nth-child(1) { left: 8%; top: 18%; animation-delay: 0s; }
    .bg-bokeh span:nth-child(2) { left: 22%; top: 68%; animation-delay: 1.1s; }
    .bg-bokeh span:nth-child(3) { left: 42%; top: 24%; animation-delay: 2.1s; }
    .bg-bokeh span:nth-child(4) { left: 64%; top: 72%; animation-delay: 0.7s; }
    .bg-bokeh span:nth-child(5) { left: 82%; top: 22%; animation-delay: 1.8s; }
    .bg-bokeh span:nth-child(6) { left: 91%; top: 58%; animation-delay: 2.7s; }

    .ambient-notes span {
      position: absolute;
      color: rgba(189, 76, 133, 0.55);
      font-size: clamp(18px, 2.8vw, 34px);
      font-weight: 700;
      animation: noteDrift 5.5s ease-in-out infinite;
      text-shadow: 0 3px 10px rgba(209, 91, 146, 0.32);
    }

    .ambient-notes span:nth-child(1) { left: 12%; top: 78%; animation-delay: 0s; }
    .ambient-notes span:nth-child(2) { left: 28%; top: 12%; animation-delay: 1.2s; }
    .ambient-notes span:nth-child(3) { left: 56%; top: 82%; animation-delay: 2.2s; }
    .ambient-notes span:nth-child(4) { left: 76%; top: 18%; animation-delay: 0.8s; }
    .ambient-notes span:nth-child(5) { left: 90%; top: 74%; animation-delay: 2.8s; }

    .gift-container {
      position: relative;
      perspective: 1200px;
      animation: gentleShake 1.5s ease-in-out infinite;
      user-select: none;
      width: min(88vw, 440px);
      max-width: none;
      aspect-ratio: 1 / 1;
    }

    .gift-container::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 22%;
      width: clamp(180px, 52vw, 260px);
      height: clamp(180px, 52vw, 260px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.34) 0%, rgba(255, 255, 255, 0) 72%);
      animation: auraPulse 2.6s ease-in-out infinite;
      z-index: -1;
    }

    .open .gift-container {
      animation: none;
    }

    @keyframes gentleShake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes backgroundFlow {
      0%, 100% { background-position: 0% 40%; }
      50% { background-position: 100% 60%; }
    }

    @keyframes glowDrift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -18px) scale(1.08); }
    }

    @keyframes bokehFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.55; }
      50% { transform: translateY(-16px) scale(1.25); opacity: 0.95; }
    }

    @keyframes noteDrift {
      0%, 100% { transform: translateY(0) rotate(-6deg); opacity: 0.35; }
      50% { transform: translateY(-18px) rotate(8deg); opacity: 0.85; }
    }

    @keyframes auraPulse {
      0%, 100% { opacity: 0.45; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.09); }
    }

    :root {
      --hop-width: min(60vw, 240px);
      --hop-height: min(42vw, 160px);
      --nap-width: min(68vw, 270px);
      --nap-height: min(26vw, 100px);
    }

    .gift-body {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: translateX(-50%) translateY(0) scale(1.06);
      z-index: 1;
      transition: transform 0.3s ease 0.5s;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffd3e8 0%, #ffb8d9 42%, #f88bbd 100%);
      box-shadow:
        0 14px 26px rgba(212, 88, 148, 0.35),
        inset 0 -12px 18px rgba(185, 58, 121, 0.25),
        inset 0 8px 0 rgba(255, 255, 255, 0.35);
      overflow: visible;
    }

    .gift-body::before {
      content: "";
      position: absolute;
      width: min(34vw, 126px);
      height: min(34vw, 126px);
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fff8fd 0 9px, #ff95c4 10px 17px, #f56ca8 18px 26px, #bc3f7a 27px 66px);
      box-shadow: 0 0 0 7px rgba(255, 255, 255, 0.28);
      animation: spinDisc 6s linear infinite;
    }

    .gift-body::after {
      content: "";
      position: absolute;
      width: 62px;
      height: 11px;
      right: -14px;
      top: 45%;
      transform: translateY(-50%) rotate(-12deg);
      border-radius: 999px;
      background: linear-gradient(90deg, #ef76b2 0%, #cd4f90 100%);
      box-shadow: 0 4px 10px rgba(208, 83, 143, 0.3);
    }

    .open .gift-body {
      transform: translateX(-50%) translateY(min(8vw, 30px)) scale(1.06);
    }

    .gift-lid {
      position: absolute;
      left: 50%;
      width: var(--nap-width);
      height: var(--nap-height);
      bottom: calc(var(--hop-height) - min(3vw, 12px));
      transform: translateX(-50%) translateY(0) scale(1);
      transform-origin: center;
      transition: opacity 0.3s ease 0.3s;
      z-index: 2;
      filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.2));
      border-radius: 20px;
      background: linear-gradient(90deg, #ffdff0 0%, #ffc9e3 50%, #ffb0d3 100%);
      box-shadow: 0 6px 14px rgba(209, 93, 146, 0.25);
    }

    .gift-lid::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      right: -8px;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff4fb 0 24%, #ff9fcb 25% 100%);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.38);
    }

    .open .gift-lid {
      animation: liftLid 0.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes liftLid {
      0% {
        transform: translateX(-50%) translateY(0) scale(1);
        bottom: calc(var(--hop-height) - min(3vw, 12px));
      }
      50% {
        transform: translateX(-50%) translateY(-10px) scale(1.01);
        bottom: calc(var(--hop-height) - min(3vw, 12px) + 10px);
      }
      100% {
        transform: translateX(-50%) translateY(-10px) scale(1.01);
        bottom: calc(var(--hop-height) - min(3vw, 12px) + 10px);
      }
    }

    @keyframes spinDisc {
      0% { transform: translateX(-50%) rotate(0deg); }
      100% { transform: translateX(-50%) rotate(360deg); }
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, #fff 30%, #ff8fc2 70%, transparent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      animation: sparkleBurst 0.5s ease-out forwards;
    }

    @keyframes sparkleBurst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(calc(var(--dx) * 1px), calc(var(--dy) * 1px)) scale(0.2) rotate(360deg);
      }
    }

    .hint-text {
      margin-top: clamp(10px, 2.8vw, 16px);
      font-size: clamp(0.92rem, 2.6vw, 1.15rem);
      font-family: 'Nunito', sans-serif;
      color: #a03f74;
      text-align: center;
      font-weight: 800;
      animation: blink 1.5s infinite;
      user-select: none;
      line-height: 1.3;
      padding: 0 12px;
      letter-spacing: 0.2px;
      z-index: 1;
      position: relative;
    }

    .hint-text::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(184, 67, 125, 0.5) 50%, transparent 100%);
      animation: hintShimmer 1.8s linear infinite;
    }

    @keyframes hintShimmer {
      0% { transform: translateX(-15%); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(15%); opacity: 0; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(97, 20, 58, 0.82);
      backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.35s ease, visibility 0.35s ease;
      z-index: 80;
    }

    .video-overlay.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .video-shell {
      width: min(92vw, 820px);
      border-radius: 26px;
      padding: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 237, 247, 0.12));
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 20px 60px rgba(52, 8, 29, 0.35);
      text-align: center;
      transform: translateY(10px) scale(0.98);
      transition: transform 0.35s ease;
    }

    .video-overlay.show .video-shell {
      transform: translateY(0) scale(1);
    }

    .intro-video {
      width: 100%;
      max-height: min(70vh, 540px);
      border-radius: 20px;
      background: #12070d;
      box-shadow: 0 14px 30px rgba(31, 4, 18, 0.35);
      display: block;
      object-fit: contain;
    }

    .video-caption {
      margin-top: 14px;
      color: #fff3fa;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .video-skip {
      margin-top: 12px;
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      color: #8c245d;
      background: linear-gradient(180deg, #fff7fb 0%, #ffddea 100%);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      cursor: pointer;
    }

    .video-skip:hover {
      filter: brightness(1.02);
    }

    /* Tối ưu cho điện thoại dọc */
    @media (max-width: 480px) {
      .gift-wrapper {
        width: min(96vw, 380px);
        border-radius: 22px;
        padding: 6px;
      }
      
      .gift-container {
        width: min(90vw, 340px);
      }
      
      :root {
        --hop-width: min(65vw, 220px);
        --hop-height: min(45vw, 150px);
        --nap-width: min(72vw, 250px);
        --nap-height: min(28vw, 95px);
      }
      
      .hint-text {
        font-size: clamp(0.86rem, 3.9vw, 1rem);
        margin-top: clamp(8px, 3vw, 14px);
        padding: 0 12px;
      }
    }

    /* Tối ưu cho màn hình rất nhỏ */
    @media (max-height: 500px) or (max-width: 360px) {
      .gift-wrapper {
        width: min(96vw, 320px);
        padding: 4px;
      }
      
      .gift-container {
        width: min(88vw, 300px);
      }
      
      :root {
        --hop-width: min(70vw, 200px);
        --hop-height: min(48vw, 140px);
        --nap-width: min(78vw, 230px);
        --nap-height: min(30vw, 85px);
      }
      
      .hint-text {
        font-size: clamp(0.78rem, 4.4vw, 0.9rem);
        margin-top: clamp(8px, 3vw, 15px);
        line-height: 1.2;
      }
    }

   
    @media (orientation: landscape) {
      body {
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }
      
      .gift-wrapper {
        width: min(78vw, 540px);
        margin-top: 0;
        padding: 6px;
      }
      
      .hint-text {
        margin-top: clamp(6px, 1.6vw, 11px);
        max-width: 92%;
        font-size: clamp(0.82rem, 1.8vw, 0.95rem);
        writing-mode: horizontal-tb;
      }
    }

    /* Tối ưu cho máy tính */
    @media (min-width: 768px) {
      .gift-wrapper {
        width: min(82vw, 620px);
        margin-top: 0;
      }
      
      .gift-container {
        width: min(50vw, 500px);
      }
      
      .hint-text {
        font-size: clamp(1rem, 1.25vw, 1.15rem);
        margin-top: clamp(12px, 1.8vh, 20px);
        writing-mode: horizontal-tb;
      }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="click-area" id="giftClickArea"></div>

  <div class="bg-bokeh" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="ambient-notes" aria-hidden="true">
    <span>♡</span><span>✦</span><span>♥</span><span>☆</span><span>♡</span>
  </div>

  <div class="hero-copy">
    <h1 class="hero-title">Chúc mừng sinh nhật</h1>
    <p class="hero-sub">Một món quà nhỏ chứa thật nhiều tình cảm đang chờ cậu mở ra.</p>
  </div>

  <div class="gift-wrapper">
    <div class="gift-container">
      <img src="./image/test.gif" alt="Hộp quà" class="gift-body">
    
    </div>
    <div class="hint-text">Chạm nhẹ để mở quà nha</div>
  </div>

  <div class="video-overlay" id="videoOverlay" aria-hidden="true">
    <div class="video-shell">
      <video id="introVideo" class="intro-video" controls playsinline preload="auto"></video>
      <div class="video-caption">Đừng cảm động quá nha.</div>
      <button class="video-skip" id="skipVideoBtn" type="button">Bỏ qua video</button>
    </div>
  </div>

  <audio id="bgm" src="./mucsic/Bản sao Happy Birthday To You.mp3" preload="auto" loop playsinline></audio>

  <script>
    const clickArea = document.getElementById('giftClickArea');
    const container = document.querySelector('.gift-container');
    const body = document.body;
    const bgm = document.getElementById('bgm');
    const videoOverlay = document.getElementById('videoOverlay');
    const introVideo = document.getElementById('introVideo');
    const skipVideoBtn = document.getElementById('skipVideoBtn');
    const MUSIC_ENABLED_KEY = 'cmsnMusicEnabled';
    const MUSIC_TIME_KEY = 'cmsnMusicTime';
    const MUSIC_SESSION_FLAG_KEY = 'cmsnMusicSessionActive';
    const INTRO_VIDEO_SRC = './image/video.mp4';
    let isAnimating = false;
    let lastSavedTime = -1;
    let hasNavigatedToLetter = false;

    function initMusicSession() {
      if (!sessionStorage.getItem(MUSIC_SESSION_FLAG_KEY)) {
        localStorage.removeItem(MUSIC_TIME_KEY);
      }
      sessionStorage.setItem(MUSIC_SESSION_FLAG_KEY, '1');
    }

    function getMusicEnabled() {
      return localStorage.getItem(MUSIC_ENABLED_KEY) !== '0';
    }

    function setMusicEnabled(enabled) {
      localStorage.setItem(MUSIC_ENABLED_KEY, enabled ? '1' : '0');
    }

    function tryPlayMusic() {
      if (!bgm || !getMusicEnabled()) return;
      bgm.volume = 0.6;
      bgm.muted = false;
      bgm.play().catch(() => {
      });
    }

    function unlockMusicOnFirstGesture() {
      const unlock = () => {
        setMusicEnabled(true);
        tryPlayMusic();
        document.removeEventListener('pointerdown', unlock);
        document.removeEventListener('keydown', unlock);
      };

      document.addEventListener('pointerdown', unlock, { once: true });
      document.addEventListener('keydown', unlock, { once: true });
    }

    function restoreMusicTime() {
      const savedTime = Number(localStorage.getItem(MUSIC_TIME_KEY) || '0');
      if (Number.isFinite(savedTime) && savedTime > 0) {
        bgm.currentTime = savedTime;
      }
    }

    initMusicSession();

    function saveMusicTime() {
      if (!bgm) return;
      const current = Number((bgm.currentTime || 0).toFixed(3));
      if (current !== lastSavedTime) {
        lastSavedTime = current;
        localStorage.setItem(MUSIC_TIME_KEY, String(current));
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.body.style.touchAction = 'manipulation';
      if (bgm) {
        bgm.addEventListener('loadedmetadata', restoreMusicTime, { once: true });
        bgm.addEventListener('timeupdate', saveMusicTime);
        bgm.addEventListener('canplay', tryPlayMusic);
      }

      const autoplayRetry = setInterval(() => {
        if (bgm && bgm.paused && getMusicEnabled()) {
          tryPlayMusic();
        } else {
          clearInterval(autoplayRetry);
        }
      }, 800);

      setTimeout(() => {
        clearInterval(autoplayRetry);
      }, 8000);

      unlockMusicOnFirstGesture();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        saveMusicTime();
      } else {
        tryPlayMusic();
      }
    });

    clickArea.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (isAnimating) return;
      isAnimating = true;
      setMusicEnabled(true);
      tryPlayMusic();

      const isOpen = container.classList.contains('open');
      if (!isOpen) {
        openGift();
      }
    });

    function openGift() {
      container.classList.add('open');
      createSparkles();

      setTimeout(() => {
        playIntroVideo();
      }, 700);
    }

    function playIntroVideo() {
      if (!videoOverlay || !introVideo) {
        goToLetterPage();
        return;
      }

      // pause background music while video plays
      if (bgm && !bgm.paused) {
        try {
          saveMusicTime();
        } catch (e) {}
        try { bgm.pause(); } catch (e) {}
      }

      introVideo.pause();
      introVideo.removeAttribute('src');
      introVideo.load();
      introVideo.src = INTRO_VIDEO_SRC;
      introVideo.currentTime = 0;
      videoOverlay.classList.add('show');
      videoOverlay.setAttribute('aria-hidden', 'false');

      const startPlayback = introVideo.play();
      if (startPlayback && typeof startPlayback.catch === 'function') {
        startPlayback.catch(() => {
          introVideo.controls = true;
        });
      }
    }

    function goToLetterPage() {
      if (hasNavigatedToLetter) return;
      hasNavigatedToLetter = true;
      try {
        // Ensure music will play after video: enable and reset time to 0
        try { setMusicEnabled(true); } catch (e) {}
        try { localStorage.setItem(MUSIC_TIME_KEY, '0'); } catch (e) {}
        // navigate to letter page; that page will resume bgm based on stored keys
        window.location.href = 'thu.html';
      } catch (err) {
        console.error('Lỗi chuyển trang:', err);
        alert('Không thể chuyển đến trang thu.html. Hãy kiểm tra lại tệp!');
        body.classList.remove('fade-out');
        container.classList.remove('open');
        isAnimating = false;
        hasNavigatedToLetter = false;
      }
    }

    introVideo.addEventListener('ended', goToLetterPage);
    introVideo.addEventListener('error', goToLetterPage);
    skipVideoBtn.addEventListener('click', () => {
      // hide overlay quickly when user skips
      if (videoOverlay) {
        videoOverlay.classList.remove('show');
        videoOverlay.setAttribute('aria-hidden', 'true');
      }
      goToLetterPage();
    });

    function createSparkles() {
      const sparkleCount = window.innerWidth <= 360 ? 4 : 6;
      for (let i = 0; i < sparkleCount; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 35;
        const dy = (Math.random() - 0.5) * 35;
        s.style.setProperty('--dx', dx);
        s.style.setProperty('--dy', dy);
        s.style.left = `${40 + Math.random() * 20}%`;
        s.style.top = `${20 + Math.random() * 30}%`;
        s.style.animationDelay = `${Math.random() * 0.05}s`;
        container.appendChild(s);
        setTimeout(() => s.remove(), 500);
      }
    }

    window.addEventListener('pagehide', saveMusicTime);
    window.addEventListener('beforeunload', saveMusicTime);
  </script>
</body>
</html>
