  <style>
    :root {
      --sparkle-opacity: 0.9;
      --sparkle-dot-size: 7px;
      --sparkle-glow: 0 0 9px rgba(255, 224, 241, 0.92);
      --sparkle-shadows:
        22px -8px 0 -1px rgba(255, 240, 248, 0.98),
        -14px 18px 0 -2px rgba(255, 222, 239, 0.95),
        14px 26px 0 -2px rgba(255, 235, 246, 0.93),
        -20px -6px 0 -2px rgba(255, 246, 252, 0.95);
      --sparkle-duration: 2.8s;
      --sparkle-scale-max: 1.26;
    }

    /* doi class body thanh sparkle-soft neu muon ban diu mat hon */
    body.sparkle-rich {
      --sparkle-opacity: 0.95;
      --sparkle-dot-size: 8px;
      --sparkle-glow: 0 0 11px rgba(255, 224, 241, 1);
      --sparkle-shadows:
        24px -10px 0 -1px rgba(255, 245, 252, 1),
        -16px 20px 0 -2px rgba(255, 226, 241, 0.97),
        16px 28px 0 -2px rgba(255, 239, 249, 0.96),
        -22px -8px 0 -2px rgba(255, 248, 252, 0.98),
        6px 36px 0 -3px rgba(255, 238, 248, 0.92);
      --sparkle-duration: 2.4s;
      --sparkle-scale-max: 1.34;
    }

    body.sparkle-soft {
      --sparkle-opacity: 0.62;
      --sparkle-dot-size: 6px;
      --sparkle-glow: 0 0 6px rgba(255, 224, 241, 0.62);
      --sparkle-shadows:
        18px -8px 0 -2px rgba(255, 240, 248, 0.76),
        -12px 14px 0 -2px rgba(255, 222, 239, 0.7),
        12px 22px 0 -3px rgba(255, 235, 246, 0.66);
      --sparkle-duration: 3.6s;
      --sparkle-scale-max: 1.12;
    }

    .love-text {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #ff69b4;
      text-shadow:
        0 0 10px rgba(255, 105, 180, 0.8),
        0 0 20px rgba(255, 105, 180, 0.6),
        2px 2px 4px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      animation: glow 2s ease-in-out infinite alternate;
      white-space: nowrap;
      text-align: center;
      margin-top: 70px;
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 10px rgba(255, 105, 180, 0.8),
          0 0 20px rgba(255, 105, 180, 0.6),
          2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      to {
        text-shadow:
          0 0 20px rgba(255, 105, 180, 1),
          0 0 30px rgba(255, 105, 180, 0.8),
          0 0 40px rgba(255, 182, 193, 0.6),
          2px 2px 4px rgba(0, 0, 0, 0.3);
      }
    }

    @media (max-width: 768px) {
      .love-text {
        font-size: 32px;
        top: 40px;
      }
    }

    @media (max-width: 480px) {
      .love-text {
        font-size: 24px;
        top: 30px;
      }
    }

    .music-toggle {
      display: none;
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 1200;
      border: 1px solid rgba(255, 255, 255, 0.55);
      background: linear-gradient(135deg, rgba(255, 138, 196, 0.92) 0%, rgba(255, 181, 220, 0.92) 100%);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-family: 'Dancing Script', cursive;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(255, 105, 180, 0.28);
      backdrop-filter: blur(4px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .music-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(255, 105, 180, 0.35);
    }

    .floating-images {
      width: min(34vw, 420px);
    }

    .floating-images .floating-circle {
      --dur: 13s;
      --delay: 0s;
      --x-drift: 14px;
      --scale: 1;
      width: clamp(80px, 12vmin, 150px);
      height: clamp(80px, 12vmin, 150px);
      border: 3px solid rgba(255, 225, 241, 0.9);
      box-shadow:
        0 10px 22px rgba(255, 170, 214, 0.35),
        0 0 20px rgba(255, 186, 219, 0.45),
        inset 0 0 14px rgba(255, 255, 255, 0.45);
      animation:
        bubble-rise var(--dur) ease-in-out infinite var(--delay),
        bubble-wobble calc(var(--dur) * 0.6) ease-in-out infinite var(--delay);
      will-change: transform, opacity;
    }

    .floating-images .floating-circle::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.55) 0 16%, transparent 45%);
      pointer-events: none;
    }

    .floating-images .floating-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      pointer-events: none;
    }

    .floating-images .floating-circle::before {
      content: "";
      position: absolute;
      width: var(--sparkle-dot-size);
      height: var(--sparkle-dot-size);
      left: 18%;
      top: 22%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 1) 0%, rgba(255, 244, 252, 0.85) 45%, rgba(255, 244, 252, 0) 100%);
      box-shadow: var(--sparkle-shadows);
      filter: drop-shadow(var(--sparkle-glow));
      opacity: var(--sparkle-opacity);
      pointer-events: none;
      animation: bubble-sparkle var(--sparkle-duration) ease-in-out infinite;
    }

    .floating-images .floating-circle:nth-child(odd)::before {
      animation-duration: 3.4s;
      animation-delay: 0.35s;
    }

    .floating-images .floating-circle:nth-child(3n)::before {
      animation-duration: 2.6s;
      animation-delay: 0.7s;
    }

    .floating-images .floating-circle:nth-child(1) { left: 10% !important; --delay: 0s; --dur: 12.4s; --x-drift: 10px; --scale: 0.93; }
    .floating-images .floating-circle:nth-child(2) { left: 18% !important; --delay: 1.1s; --dur: 13.2s; --x-drift: 18px; --scale: 1.05; }
    .floating-images .floating-circle:nth-child(3) { left: 27% !important; --delay: 2.1s; --dur: 12.8s; --x-drift: 14px; --scale: 0.97; }
    .floating-images .floating-circle:nth-child(4) { left: 36% !important; --delay: 3.2s; --dur: 13.7s; --x-drift: 20px; --scale: 1.09; }
    .floating-images .floating-circle:nth-child(5) { left: 45% !important; --delay: 4.2s; --dur: 12.9s; --x-drift: 13px; --scale: 1.02; }
    .floating-images .floating-circle:nth-child(6) { left: 54% !important; --delay: 5.2s; --dur: 13.6s; --x-drift: 21px; --scale: 1.12; }
    .floating-images .floating-circle:nth-child(7) { left: 63% !important; --delay: 6.1s; --dur: 12.5s; --x-drift: 12px; --scale: 0.95; }
    .floating-images .floating-circle:nth-child(8) { left: 72% !important; --delay: 7.1s; --dur: 13.4s; --x-drift: 17px; --scale: 1.08; }
    .floating-images .floating-circle:nth-child(9) { left: 80% !important; --delay: 8.2s; --dur: 12.7s; --x-drift: 11px; --scale: 0.92; }
    .floating-images .floating-circle:nth-child(10) { left: 88% !important; --delay: 9.3s; --dur: 13.3s; --x-drift: 19px; --scale: 1.06; }
    .floating-images .floating-circle:nth-child(11) { left: 95% !important; --delay: 10.3s; --dur: 12.6s; --x-drift: 15px; --scale: 0.98; }

    @keyframes bubble-rise {
      0% {
        opacity: 0;
        bottom: -14vmin;
        transform: translateX(-50%) translateY(0) scale(calc(var(--scale) * 0.7));
      }
      12% {
        opacity: 0.92;
      }
      52% {
        opacity: 1;
      }
      82% {
        opacity: 0.68;
      }
      100% {
        opacity: 0;
        bottom: 112vmin;
        transform: translateX(-50%) translateY(-8px) scale(calc(var(--scale) * 1.04));
      }
    }

    @keyframes bubble-wobble {
      0%,
      100% {
        transform: translateX(-50%) translateY(0) scale(calc(var(--scale) * 0.96)) rotate(-3deg);
      }
      25% {
        transform: translateX(calc(-50% + var(--x-drift))) translateY(-6px) scale(calc(var(--scale) * 1.02)) rotate(4deg);
      }
      50% {
        transform: translateX(calc(-50% - var(--x-drift))) translateY(-4px) scale(calc(var(--scale) * 1.06)) rotate(-5deg);
      }
      75% {
        transform: translateX(calc(-50% + calc(var(--x-drift) * 0.7))) translateY(-9px) scale(var(--scale)) rotate(3deg);
      }
    }

    @keyframes bubble-sparkle {
      0%,
      100% {
        opacity: calc(var(--sparkle-opacity) * 0.62);
        transform: scale(0.85) rotate(0deg);
      }
      35% {
        opacity: 1;
        transform: scale(var(--sparkle-scale-max)) rotate(14deg);
      }
      70% {
        opacity: calc(var(--sparkle-opacity) * 0.82);
        transform: scale(0.92) rotate(-11deg);
      }
    }

    @media (max-width: 768px) {
      .floating-images {
        width: min(36vw, 300px);
      }

      .floating-images .floating-circle {
        width: clamp(80px, 12vmin, 140px);
        height: clamp(80px, 12vmin, 140px);
      }

      .floating-images--left {
        left: 4vw;
      }

      .floating-images--right {
        right: 4vw;
      }
    }
  </style>
</head>

  <audio id="bgmFlores" src="../mucsic/Bản sao Happy Birthday To You.mp3" preload="auto" playsinline loop></audio>

  <script>
    const bgmFlores = document.getElementById('bgmFlores');
    const musicToggle = document.getElementById('musicToggle');
    const MUSIC_ENABLED_KEY = 'cmsnMusicEnabled';
    const MUSIC_TIME_KEY = 'cmsnMusicTime';
    const MUSIC_SESSION_FLAG_KEY = 'cmsnMusicSessionActive';
    let lastSavedTime = -1;

    function initMusicSession() {
      if (!sessionStorage.getItem(MUSIC_SESSION_FLAG_KEY)) {
        localStorage.removeItem(MUSIC_TIME_KEY);
      }
      sessionStorage.setItem(MUSIC_SESSION_FLAG_KEY, '1');
    }

    function getMusicEnabled() {
      return localStorage.getItem(MUSIC_ENABLED_KEY) !== '0';
    }

    function setMusicEnabled(enabled) {
      localStorage.setItem(MUSIC_ENABLED_KEY, enabled ? '1' : '0');
    }

    function updateMusicButton() {
      const musicEnabled = getMusicEnabled();
      musicToggle.textContent = musicEnabled ? 'Nhac: Bat' : 'Nhac: Tat';
    }

    function tryPlayMusic() {
      const musicEnabled = getMusicEnabled();
      if (!bgmFlores || !musicEnabled) return;
      bgmFlores.volume = 0.6;
      bgmFlores.play().catch(() => {
      });
    }

    function unlockMusicOnFirstGesture() {
      const unlock = () => {
        setMusicEnabled(true);
        tryPlayMusic();
        document.removeEventListener('pointerdown', unlock);
        document.removeEventListener('keydown', unlock);
      };

      document.addEventListener('pointerdown', unlock, { once: true });
      document.addEventListener('keydown', unlock, { once: true });
    }

    function restoreMusicTime() {
      const savedTime = Number(localStorage.getItem(MUSIC_TIME_KEY) || '0');
      if (Number.isFinite(savedTime) && savedTime > 0) {
        bgmFlores.currentTime = savedTime;
      }
    }

    initMusicSession();

    function saveMusicTime() {
      if (!bgmFlores) return;
      const current = Number((bgmFlores.currentTime || 0).toFixed(3));
      if (current !== lastSavedTime) {
        lastSavedTime = current;
        localStorage.setItem(MUSIC_TIME_KEY, String(current));
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      bgmFlores.addEventListener('loadedmetadata', restoreMusicTime, { once: true });
      bgmFlores.addEventListener('timeupdate', saveMusicTime);
      unlockMusicOnFirstGesture();
      tryPlayMusic();
      const autoplayRetry = setInterval(() => {
        const musicEnabled = getMusicEnabled();
        if (bgmFlores.paused && musicEnabled) {
          tryPlayMusic();
        } else {
          clearInterval(autoplayRetry);
        }
      }, 800);

      setTimeout(() => {
        clearInterval(autoplayRetry);
      }, 8000);
    });

    bgmFlores.addEventListener('canplay', tryPlayMusic);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        saveMusicTime();
      } else if (getMusicEnabled()) {
        tryPlayMusic();
      }
    });

    musicToggle.addEventListener('click', () => {
      const musicEnabled = !getMusicEnabled();
      setMusicEnabled(musicEnabled);
      updateMusicButton();

      if (musicEnabled) {
        tryPlayMusic();
      } else {
        saveMusicTime();
        bgmFlores.pause();
      }
    });

    window.addEventListener('pagehide', saveMusicTime);
    window.addEventListener('beforeunload', saveMusicTime);

    updateMusicButton();
  </script>

  <script>
    // Randomize bubble sizes/animation parameters for a more natural, varied movement
    document.addEventListener('DOMContentLoaded', () => {
      const circles = document.querySelectorAll('.floating-images .floating-circle');
      circles.forEach((el) => {
        const dur = (10 + Math.random() * 12).toFixed(2) + 's';
        const delay = (Math.random() * -10).toFixed(2) + 's';
        const xdrift = Math.floor(8 + Math.random() * 40) + 'px';
        const scale = (0.92 + Math.random() * 0.48).toFixed(2);
        el.style.setProperty('--dur', dur);
        el.style.setProperty('--delay', delay);
        el.style.setProperty('--x-drift', xdrift);
        el.style.setProperty('--scale', scale);

        // spread bubbles horizontally within their container for a more random layout
        const parent = el.closest('.floating-images');
        if (parent && parent.classList.contains('floating-images--left')) {
          el.style.left = `${5 + Math.random() * 65}%`;
        } else {
          el.style.left = `${10 + Math.random() * 65}%`;
        }
      });
    });
  </script>
